version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: sijawi-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=sijawi
    restart: unless-stopped
    networks:
      - sijawi-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sijawi-web
    ports:
      - "3200:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/sijawi
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - sijawi-network

volumes:
  mongodb_data:
    driver: local

networks:
  sijawi-network:
    driver: bridge