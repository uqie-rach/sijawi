version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: sijawi-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=sijawi
    restart: unless-stopped
    networks:
      - sijawi-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: sijawi-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - sijawi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sijawi-web
    ports:
      - "3200:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/sijawi
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - RUN_SEED=false
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sijawi-network

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sijawi-seed
    command:
      - npx
      - tsx
      - scripts/seed.ts
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/sijawi
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - sijawi-network
    profiles:
      - seed

volumes:
  mongodb_data:
    driver: local

networks:
  sijawi-network:
    driver: bridge